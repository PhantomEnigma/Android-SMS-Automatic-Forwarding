name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # This tells GitHub to run EVERY step inside your project folder
    defaults:
      run:
        working-directory: ./android-studio-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Using assembleDebug first is safer for testing
        run: ./gradlew assembleDebug

      - name: Find apk
        run: find . -name "*.apk"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-forwarder-debug-apk
          # Note: The path is relative to the working-directory set above
          path: **/*.apk
